const TOTAL_STEPS=40; // approx for progress

function pct(){
  if(state.step===0)return 0;
  if(state.step===1)return 2;
  const idx=state.step-2;
  const total=state.screens.length;
  return Math.min(98,Math.round((idx/total)*100));
}

function render(){
  const app=document.getElementById('app');
  if(state.step===0){renderLanding(app);return;}
  if(state.step===1){renderGender(app);return;}
  const si=state.step-2;
  const sc=state.screens[si];
  if(!sc){renderFinal(app);return;}

  let html=`<div class="header"><button class="back-btn" onclick="goBack()">&#8592;</button><img src="${LOGO}" alt="Mounjaro de Pobre"></div>
<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct()}%"></div></div></div>`;

  switch(sc.type){
    case 'single-image':    html+=renderSingleImage(sc,si);break;
    case 'social-proof':    html+=renderSocialProof(sc,si);break;
    case 'single-emoji':    html+=renderSingleEmoji(sc,si);break;
    case 'interstitial':    html+=renderInterstitial(sc,si);break;
    case 'multi-image':     html+=renderMultiImage(sc,si);break;
    case 'single-char':     html+=renderSingleChar(sc,si);break;
    case 'multi-icon-sub':  html+=renderMultiIconSub(sc,si);break;
    case 'food-picker':     html+=renderFoodPicker(sc,si);break;
    case 'multi-problem':   html+=renderMultiProblem(sc,si);break;
    case 'multi-emoji':     html+=renderMultiEmoji(sc,si);break;
    case 'rosto':           html+=renderRosto(sc,si);break;
    case 'slider-height':   html+=renderSliderHeight(si);break;
    case 'slider-weight':   html+=renderSliderWeight(si);break;
    case 'slider-target':   html+=renderSliderTarget(si);break;
    case 'age-input':       html+=renderAgeInput(si);break;
    case 'bmi-result':      html+=renderBmiResult(sc,si);break;
    case 'projection':      html+=renderProjection(si);break;
    case 'loading':         html+=renderLoading();break;
    case 'final-result':    html+=renderFinalResult();break;
  }
  app.innerHTML=html;
  if(sc.type==='loading')startLoading();
}

function buildProjectionSVG(){
  const w=460,h=220;
  // curve points (x,y) — starts top-left, ends bottom-right
  const pts=[
    [50,28],[110,55],[160,82],[220,118],[300,158],[370,178],[420,188]
  ];
  // cubic bezier path string
  const curve=`M${pts[0][0]},${pts[0][1]} C${pts[0][0]+30},${pts[0][1]} ${pts[1][0]-30},${pts[1][1]} ${pts[1][1]?`${pts[1][0]},${pts[1][1]}`:''}` ;
  // build smooth path with catmull-rom style
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
    const cp1x=p1[0]+(p2[0]-p0[0])/5, cp1y=p1[1]+(p2[1]-p0[1])/5;
    const cp2x=p2[0]-(p3[0]-p1[0])/5, cp2y=p2[1]-(p3[1]-p1[1])/5;
    d+=` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
  }
  const areaD=d+` L${pts[pts.length-1][0]},${h-30} L${pts[0][0]},${h-30} Z`;
  const dotColors=['#e63946','#e8834a','#e8a040','#f0b429','#96cc60','#55c28a','#3db8ac'];
  const gridLines=[50,90,130,170];
  const gridCols=[50,160,270,370,420];
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;margin:4px 0;border-radius:14px;overflow:hidden">
    <defs>
      <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#e63946"/>
        <stop offset="45%" stop-color="#f0b429"/>
        <stop offset="100%" stop-color="#3db8ac"/>
      </linearGradient>
      <linearGradient id="areag" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#e63946" stop-opacity="0.25"/>
        <stop offset="45%" stop-color="#f0b429" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#3db8ac" stop-opacity="0.15"/>
      </linearGradient>
      <clipPath id="chartClip">
        <rect x="0" y="0" width="${w}" height="${h-28}"/>
      </clipPath>
    </defs>
    <rect x="0" y="0" width="${w}" height="${h}" fill="#fff" rx="14"/>
    <!-- grid horizontal -->
    ${gridLines.map(y=>`<line x1="45" y1="${y}" x2="${w-10}" y2="${y}" stroke="#e8e8e8" stroke-width="1"/>`).join('')}
    <!-- grid vertical -->
    ${gridCols.map(x=>`<line x1="${x}" y1="20" x2="${x}" y2="${h-28}" stroke="#e8e8e8" stroke-width="1"/>`).join('')}
    <!-- filled area -->
    <path d="${areaD}" fill="url(#areag)" clip-path="url(#chartClip)"/>
    <!-- curve line -->
    <path d="${d}" fill="none" stroke="url(#pg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#chartClip)"/>
    <!-- dots with halo -->
    ${pts.map((p,i)=>`
      <circle cx="${p[0]}" cy="${p[1]}" r="10" fill="#ccc" opacity="0.35"/>
      <circle cx="${p[0]}" cy="${p[1]}" r="6" fill="${dotColors[i]}"/>`).join('')}
    <!-- Você label -->
    <rect x="${pts[0][0]-22}" y="${pts[0][1]-32}" width="44" height="22" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.2"/>
    <text x="${pts[0][0]}" y="${pts[0][1]-17}" font-size="11" text-anchor="middle" fill="#333" font-weight="700">Você</text>
    <!-- target label -->
    <rect x="${pts[pts.length-1][0]-28}" y="${pts[pts.length-1][1]-28}" width="56" height="22" rx="8" fill="#3db8ac"/>
    <text x="${pts[pts.length-1][0]}" y="${pts[pts.length-1][1]-13}" font-size="11" text-anchor="middle" fill="#fff" font-weight="700">${state.targetWeight}kg</text>
    <!-- axis labels -->
    <text x="${pts[0][0]}" y="${h-10}" font-size="11" fill="#aaa" text-anchor="middle">Hoje</text>
    <text x="${pts[pts.length-1][0]}" y="${h-10}" font-size="11" fill="#aaa" text-anchor="middle">21d</text>
  </svg>`;
}

/* -------- LOADING -------- */
function renderLoading(){
  const t=testimonials[0];
  return `<div class="screen" style="padding-top:16px">
    <h2 class="load-title">Criando o seu Plano Personalizado de Jejum</h2>
    <div class="load-bar-wrap"><div class="load-bar-fill" id="loadbar" style="width:0%"></div></div>
    <div class="load-pct"><span id="loadpct">0%</span></div>
    <div class="load-status" id="loadstatus">Preparando...</div>
    <div class="test-count">+45 mil pessoas</div>
    <div class="test-sub">nos escolheram, veja o que eles falaram sobre nós...</div>
    <div class="test-card" id="testcard">
      <div class="test-hdr">
        <img src="${t.img}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">
        <div><div class="test-name">${t.name}</div><div class="test-stars">★★★★★</div></div>
      </div>
      <div class="test-ttl">${t.title}</div>
      <div class="test-body">${t.body}</div>
    </div>
    <div class="test-dots" id="testdots">
      ${testimonials.map((_,i)=>`<div class="dot ${i===0?'a':''}" onclick="showTest(${i})"></div>`).join('')}
    </div>
  </div>`;
}

function startLoading(){
  const TOTAL=10000; // 10 seconds
  const TICK=100;
  const statuses=['Preparando...','Analisando seu perfil...','Calculando seu metabolismo...','Montando seu plano alimentar...','Personalizando suas refeições...','Finalizando...'];
  let elapsed=0;
  const iv=setInterval(()=>{
    elapsed+=TICK;
    const p=Math.min(100,elapsed/TOTAL*100);
    const bar=document.getElementById('loadbar');
    const pct=document.getElementById('loadpct');
    const st=document.getElementById('loadstatus');
    if(bar)bar.style.width=p.toFixed(0)+'%';
    if(pct)pct.textContent=p.toFixed(0)+'%';
    if(st)st.textContent=statuses[Math.min(statuses.length-1,Math.floor(p/20))];
    // show each testimonial for 25% of the duration (2.5s each)
    const ti=Math.min(testimonials.length-1,Math.floor(p/(100/testimonials.length)));
    showTest(ti);
    if(elapsed>=TOTAL){clearInterval(iv);setTimeout(()=>nextStep(),300);}
  },TICK);
}

function showTest(i){
  state.testIdx=i;
  const t=testimonials[i];
  const c=document.getElementById('testcard');
  const d=document.getElementById('testdots');
  if(!c||!d)return;
  c.innerHTML=`<div class="test-hdr">
    <img src="${t.img}" style="width:44px;height:44px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">
    <div><div class="test-name">${t.name}</div><div class="test-stars">★★★★★</div></div>
  </div>
  <div class="test-ttl">${t.title}</div>
  <div class="test-body">${t.body}</div>`;
  d.innerHTML=testimonials.map((_,j)=>`<div class="dot ${j===i?'a':''}" onclick="showTest(${j})"></div>`).join('');
}

/* -------- FINAL RESULT -------- */
function renderFinalResult(){
  return `<div class="screen" style="text-align:center">
    <h2 class="final-title">O seu Plano Personalizado de Jejum está pronto!</h2>
    <p class="final-sub">De acordo com as informações que você nos forneceu, você pode atingir o seu peso ideal:</p>
    <p class="final-goal">Você chegará ${state.targetWeight}kg em 21 dias</p>
    ${buildProjectionSVG()}
    <br>
    <button class="btn-cta" onclick="window.location.href='vendas.html'">VER MEU PLANO AGORA →</button>
  </div>`;
}

/* -------- NAVIGATION -------- */
function nextStep(){state.step++;state.selected=[];render();}
function goBack(){if(state.step>0){state.step--;render();}}

function pickSingle(si,i,el){
  state.answers[si]=i;
  setTimeout(()=>nextStep(),280);
}

function pickMulti(si,i,el){
  if(!state.answers[si])state.answers[si]=[];
  const arr=state.answers[si];
  const idx=arr.indexOf(i);
  if(idx>=0)arr.splice(idx,1); else arr.push(i);
  el.classList.toggle('sel');
  const chk=el.querySelector('.ochk');
  if(chk)chk.textContent=arr.includes(i)?'✓':'';
  const btn=document.getElementById('mcBtn');
  if(btn)btn.disabled=arr.length===0;
}

function pickFood(si,item,el){
  if(!state.answers[si])state.answers[si]=[];
  const arr=state.answers[si];
  const idx=arr.indexOf(item);
  if(idx>=0)arr.splice(idx,1); else arr.push(item);
  el.classList.toggle('sel');
  const btn=document.getElementById('mcBtn');
  if(btn)btn.disabled=arr.length===0;
}

/* -------- SLIDER UTILS -------- */
function updH(v){
  const el=document.getElementById('hval');
  if(el)el.textContent=v;
}
function updW(v){
  const el=document.getElementById('wval');
  if(el)el.textContent=v;
}
function updTW(v){
  const el=document.getElementById('twval');
  if(el)el.textContent=v;
}
function saveHeight(){
  const s=document.getElementById('hslider');
  if(s){
    const v=parseInt(s.value);
    state.height=state.heightUnit==='cm'?v:Math.round(v*2.54);
  }
}
function saveWeight(){
  const s=document.getElementById('wslider');
  if(s){
    const v=parseInt(s.value);
    state.weight=state.weightUnit==='kg'?v:Math.round(v/2.205);
  }
}
function saveTarget(){
  const s=document.getElementById('twslider');
  if(s){
    const v=parseInt(s.value);
    state.targetWeight=state.weightUnit==='kg'?v:Math.round(v/2.205);
  }
}
function saveAge(){
  const el=document.getElementById('ageinput');
  if(el&&el.value){state.age=el.value;nextStep();}
  else{el&&(el.style.borderColor='#e63946');}
}
function setHUnit(u){
  saveHeight();
  state.heightUnit=u;
  render();
}
function setWUnit(u){
  saveWeight();
  state.weightUnit=u;
  render();
}

// Start
render();
</script>
</body>
</html>
