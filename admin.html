<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Mounjaro de Pobre</title>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* ── LOGIN ── */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lcard{background:#fff;border-radius:18px;padding:48px 40px;width:380px;box-shadow:0 4px 32px rgba(0,0,0,.09)}
.lcard h1{font-size:22px;font-weight:800;margin-bottom:6px}
.lcard p{color:#999;font-size:14px;margin-bottom:28px}
.lcard input{width:100%;padding:13px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;transition:.2s}
.lcard input:focus{border-color:#4A7AF5}
.lcard button{width:100%;margin-top:14px;padding:14px;background:#4A7AF5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.lcard button:hover{background:#3a6ae5}
.lcard .err{color:#e53e3e;font-size:13px;margin-top:10px;display:none}

/* ── TOPBAR ── */
#dash{display:none;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #eee;padding:0 28px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tb-brand{font-weight:800;font-size:15px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.tb-spacer{flex:1}
.tb-sync{font-size:12px;color:#4A7AF5;font-weight:500}
.tb-datechip{display:flex;align-items:center;gap:8px;background:#f5f5f7;border:1px solid #e5e5e5;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:default}
.tb-datechip svg{width:13px;height:13px;color:#888}
.tb-refresh{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:#f5f5f7;border:1px solid #e5e5e5;border-radius:8px;cursor:pointer;font-size:17px;transition:.2s}
.tb-refresh:hover{background:#eaeaef;transform:rotate(45deg)}

/* ── CONTENT ── */
.content{padding:24px 28px;max-width:1440px;margin:0 auto}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:22px}
.kc{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #efefef}
.kc-ico{width:34px;height:34px;border-radius:9px;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:14px}
.kc-lbl{font-size:11px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kc-val{font-size:30px;font-weight:900;color:#1a1a2e;line-height:1;margin-bottom:5px}
.kc-sub{font-size:11px;color:#bbb}

/* ── CARD ── */
.card{background:#fff;border-radius:14px;border:1px solid #efefef;margin-bottom:22px;overflow:hidden}
.card-hdr{padding:18px 22px 4px;display:flex;align-items:center;gap:12px}
.card-title{font-size:15px;font-weight:700;color:#1a1a2e}
.card-body{padding:12px 22px 22px}

/* ── AREA CHART ── */
#areaChart{width:100%;display:block}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:#f0f2f5;border-radius:10px;padding:4px;width:fit-content;margin-bottom:20px}
.tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:#777;border:none;background:none;transition:.15s}
.tab.active{background:#fff;color:#1a1a2e;font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.1)}

/* ── FUNNEL ── */
#funnelWrap{overflow-x:auto;padding-bottom:4px}

/* ── EVENTS TABLE ── */
.tbl-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;background:#fff;cursor:pointer;color:#333;font-weight:500;white-space:nowrap;transition:.15s}
.tbtn:hover{background:#f5f5f5}
.tbtn.red{color:#dc2626;border-color:#fca5a5}
.tbtn.red:hover{background:#fff5f5}
.pg-sel{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:#555}
.pg-sel select{border:1px solid #e0e0e0;border-radius:7px;padding:7px 10px;font-size:13px;background:#fff;cursor:pointer}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-weight:600;color:#777;border-bottom:1.5px solid #f0f0f0;white-space:nowrap;background:#fafafa}
tbody tr{border-bottom:1px solid #f5f5f7;transition:.1s}
tbody tr:hover{background:#f8f9ff}
tbody td{padding:11px 14px;vertical-align:middle;white-space:nowrap}

.td-lead{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:#e8ecff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.src{display:flex;align-items:center;gap:5px;color:#444}
.src-dot{width:8px;height:8px;border-radius:50%;background:#4A7AF5;display:inline-block}
.bev{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bev.view{background:#eef2ff;color:#4A7AF5}
.bev.ans{background:#f0fdf4;color:#16a34a}
.bev.chk{background:#fff7ed;color:#ea580c}

.pag{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:#999}
.pag-btns{display:flex;gap:5px}
.pb{padding:6px 12px;border:1px solid #e0e0e0;border-radius:7px;cursor:pointer;background:#fff;font-size:13px;transition:.1s}
.pb:hover{background:#f0f2f5}
.pb.on{background:#4A7AF5;color:#fff;border-color:#4A7AF5}

/* ── RESUMO ── */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mc{background:#f8f9ff;border-radius:12px;padding:20px}
.mc h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-lbl{width:90px;font-size:12px;color:#666;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#4A7AF5;transition:width .5s}
.bar-n{width:36px;text-align:right;font-size:12px;font-weight:700;color:#333}
.stat-row{display:flex;gap:28px;flex-wrap:wrap}
.stat{text-align:left}
.stat-v{font-size:26px;font-weight:900;color:#1a1a2e}
.stat-l{font-size:11px;color:#aaa;margin-top:3px}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:900px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .res-grid{grid-template-columns:1fr}
  .content{padding:16px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="gate">
  <div class="lcard">
    <h1>Painel Admin</h1>
    <p>Mounjaro de Pobre — acesso restrito</p>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')auth()">
    <button onclick="auth()">Entrar</button>
    <div class="err" id="err">Senha incorreta.</div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dash">
  <div class="topbar">
    <div class="tb-brand">🔥 Mounjaro de Pobre</div>
    <div class="tb-spacer"></div>
    <span class="tb-sync" id="syncTxt"></span>
    <div class="tb-datechip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="dateRange">—</span>
    </div>
    <div class="tb-refresh" onclick="doRefresh()" title="Atualizar dados">↻</div>
  </div>

  <div class="content">

    <!-- KPIs -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- Area Chart -->
    <div class="card">
      <div class="card-hdr"><span class="card-title">Visitantes (14 dias)</span></div>
      <div class="card-body"><svg id="areaChart" height="190"></svg></div>
    </div>

    <!-- Vendas Payt -->
    <div class="card" id="vendas-card">
      <div class="card-hdr"><span class="card-title">Vendas (Payt)</span><span class="tb-sync" id="vendasSync"></span></div>
      <div class="card-body" id="vendasBody"><p style="color:#bbb;font-size:13px">Carregando dados de vendas…</p></div>
    </div>

    <!-- Conversion Analysis -->
    <div class="card">
      <div class="card-hdr"><span class="card-title">Análise de Conversão</span></div>
      <div class="card-body">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('funil',this)">Funil</button>
          <button class="tab" onclick="switchTab('eventos',this)">Eventos</button>
          <button class="tab" onclick="switchTab('resumo',this)">Resumo</button>
        </div>
        <div id="tab-funil"></div>
        <div id="tab-eventos" style="display:none"></div>
        <div id="tab-resumo" style="display:none"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PWD      = 'L3c1U64&5';
const KEY      = 'mdjp_ev';
const CKEY     = 'mdjp_admin_cache';
const GAS      = 'https://script.google.com/macros/s/AKfycby-7fqfYdyX3_ox1ooSlplYeo-UfHzzXh37g7PJNW0AlrxRjJ3eid5HBxr9i25LeBX8/exec';

let _ev = [];
let _evPage = 1;
let _evPP = 10;

/* ─── AUTH ─── */
function auth(){
  if(document.getElementById('pwd').value === PWD){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dash').style.display  = 'block';
    init();
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

/* ─── TOAST ─── */
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ─── DATA ─── */
function getLocal(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
function getCache(){ try{ return JSON.parse(localStorage.getItem(CKEY)||'[]'); }catch(e){ return []; } }

function merge(a, b){
  const seen = new Set(a.map(e=>`${e.s}|${e.ev}|${e.step}|${e.t}`));
  b.forEach(e=>{ const k=`${e.s}|${e.ev}|${e.step}|${e.t}`; if(!seen.has(k)){seen.add(k);a.push(e);} });
  return a;
}

async function fetchGAS(){
  try{
    const r = await fetch(GAS);
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  }catch(e){ return []; }
}

async function init(){
  const cached = merge(getCache(), getLocal());
  if(cached.length){ _ev = cached; render(); }
  sync();
  initVendas();
}

async function sync(){
  document.getElementById('syncTxt').textContent = 'Sincronizando…';
  const remote = await fetchGAS();
  const merged = merge(remote, getLocal());
  localStorage.setItem(CKEY, JSON.stringify(merged));
  _ev = merged;
  document.getElementById('syncTxt').textContent = '';
  render();
  toast('Dados atualizados ✓');
}

async function doRefresh(){ await sync(); }

/* ─── UNIQUE SESSIONS PER STEP ─── */
function uPerStep(views){
  const m = {};
  views.forEach(e=>{
    const k = String(e.step);
    if(!m[k]) m[k] = new Set();
    m[k].add(e.s);
  });
  const c = {};
  Object.keys(m).forEach(k=>{ c[k]=m[k].size; });
  return c;
}

/* ─── MAIN RENDER ─── */
function render(){
  const views    = _ev.filter(e=>e.ev==='view' && e.step!=='vendas');
  const answers  = _ev.filter(e=>e.ev==='answer');
  const checkouts= _ev.filter(e=>e.ev==='checkout_click');
  const vViews   = _ev.filter(e=>e.ev==='view' && e.step==='vendas');

  const sc = uPerStep(views);

  renderKPIs(sc, checkouts);
  renderArea(views);
  renderFunil(sc);
  renderEventos();
  renderResumo(sc, views, answers, checkouts, vViews);
  updateDate();
}

/* ─── KPIs ─── */
function renderKPIs(sc, checkouts){
  // total unique sessions across ALL steps (more reliable than step 0 alone)
  const allViews = _ev.filter(e=>e.ev==='view' && e.step!=='vendas');
  const totalUniq = new Set(allViews.map(e=>e.s)).size || 1;
  const pv   = sc['0'] || totalUniq;
  const lds  = sc['1']||0;
  const qual = sc['21']||0;
  const done = sc['40']||0;
  const interRaw = (lds / pv) * 100;
  const inter = pv>0 ? Math.min(interRaw, 100).toFixed(1)+'%' : '0%';
  document.getElementById('kpiRow').innerHTML=[
    {ico:'👁',lbl:'Pageviews',v:pv,sub:'Visitantes que acessaram o funil'},
    {ico:'🙋',lbl:'Leads Adquiridos',v:lds,sub:'Iniciaram alguma interação'},
    {ico:'⚡',lbl:'% Interação',v:inter,sub:'Percentual de leads que interagiram'},
    {ico:'✅',lbl:'Leads Qualificados',v:qual,sub:'Completaram 50% do funil'},
    {ico:'🏁',lbl:'Fluxos Completos',v:done,sub:'Chegaram até a última etapa'},
  ].map(c=>`<div class="kc"><div class="kc-ico">${c.ico}</div><div class="kc-lbl">${c.lbl}</div><div class="kc-val">${c.v}</div><div class="kc-sub">${c.sub}</div></div>`).join('');
}

/* ─── DATE ─── */
function updateDate(){
  const now=new Date(), d14=new Date(now-14*864e5);
  const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('dateRange').textContent=f(d14)+' – '+f(now);
}

/* ─── AREA CHART ─── */
function renderArea(views){
  const svg = document.getElementById('areaChart');
  const W   = svg.parentElement.offsetWidth||880;
  const H   = 190;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);

  const landing = views.filter(e=>+e.step===0);
  const DAYS=14, now=Date.now(), ms=864e5;
  const buckets = Array.from({length:DAYS},(_,i)=>{
    const s=now-(DAYS-1-i)*ms, e=s+ms;
    return {
      n: landing.filter(x=>x.t>=s&&x.t<e).length,
      d: new Date(s)
    };
  });
  const maxV = Math.max(...buckets.map(b=>b.n),1);
  const pad  = {l:42,r:16,t:18,b:38};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;

  const pts = buckets.map((b,i)=>({
    x: pad.l+i*(cw/(DAYS-1)),
    y: pad.t+ch-(b.n/maxV)*ch
  }));

  function curve(ps){
    let d=`M${ps[0].x} ${ps[0].y}`;
    for(let i=1;i<ps.length;i++){
      const cx=(ps[i-1].x+ps[i].x)/2;
      d+=` C${cx} ${ps[i-1].y} ${cx} ${ps[i].y} ${ps[i].x} ${ps[i].y}`;
    }
    return d;
  }

  const line = curve(pts);
  const area = line+` L${pts[pts.length-1].x} ${pad.t+ch} L${pts[0].x} ${pad.t+ch}Z`;

  const labs = buckets.map((b,i)=>{
    if(i%4!==0&&i!==DAYS-1) return '';
    const lbl=b.d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','');
    return `<text x="${pts[i].x}" y="${H-6}" text-anchor="middle" font-size="11" fill="#bbb">${lbl}</text>`;
  }).join('');

  svg.innerHTML=`
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7AF5" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#4A7AF5" stop-opacity=".02"/>
    </linearGradient>
  </defs>
  <path d="${area}" fill="url(#ag)"/>
  <path d="${line}" fill="none" stroke="#4A7AF5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="${pad.l-6}" y="${pad.t+6}" text-anchor="end" font-size="10" fill="#ccc">${maxV}</text>
  ${labs}`;
}

/* ─── FUNNEL STREAM ─── */
function renderFunil(sc){
  const steps  = Array.from({length:41},(_,i)=>i);
  const counts = steps.map(i=>sc[String(i)]||0);
  const maxC   = Math.max(...counts,1);

  const SW=110, H=280, CY=H/2+16, maxH=210, topPad=16, botPad=64;
  const W = steps.length*SW;
  const totalH = H+botPad;

  const pts = steps.map((_,i)=>({
    x: i*SW+SW/2,
    h: Math.max((counts[i]/maxC)*maxH, 3)
  }));

  function curveY(pArr, yFn){
    let d=`M${pArr[0].x} ${yFn(pArr[0])}`;
    for(let i=1;i<pArr.length;i++){
      const cx=(pArr[i-1].x+pArr[i].x)/2;
      d+=` C${cx} ${yFn(pArr[i-1])} ${cx} ${yFn(pArr[i])} ${pArr[i].x} ${yFn(pArr[i])}`;
    }
    return d;
  }

  const topPath = curveY(pts, p=>CY-p.h/2);
  const botPath = curveY(pts, p=>CY+p.h/2);
  const revPts  = [...pts].reverse();
  let closed    = topPath;
  revPts.forEach((p,i)=>{
    if(i===0){ closed+=` L${p.x} ${CY+p.h/2}`; return; }
    const prev=revPts[i-1];
    const cx=(prev.x+p.x)/2;
    closed+=` C${cx} ${CY+prev.h/2} ${cx} ${CY+p.h/2} ${p.x} ${CY+p.h/2}`;
  });
  closed+=' Z';

  const gridLines = steps.map((_,i)=>`<line x1="${i*SW}" y1="${topPad}" x2="${i*SW}" y2="${H}" stroke="#f0f0f0" stroke-width="1"/>`).join('');

  const labels = steps.map((s,i)=>{
    const x=i*SW+SW/2, yBase=H+8;
    const dropPct = i>0&&counts[0]>0?((counts[i]/counts[0])*100).toFixed(0)+'%':'100%';
    return `
      <text x="${x}" y="${yBase+10}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#aaa" letter-spacing=".4">PASSO ${i+1}</text>
      <text x="${x}" y="${yBase+26}" text-anchor="middle" font-size="12.5" font-weight="800" fill="#1a1a2e">${counts[i]}</text>
      <text x="${x}" y="${yBase+40}" text-anchor="middle" font-size="10" fill="#bbb">visitantes</text>`;
  }).join('');

  document.getElementById('tab-funil').innerHTML=`
    <div id="funnelWrap">
      <svg width="${W}" height="${totalH}" style="display:block">
        <defs>
          <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#4A7AF5" stop-opacity=".85"/>
            <stop offset="70%" stop-color="#7ba7f8" stop-opacity=".75"/>
            <stop offset="100%" stop-color="#93b8fc" stop-opacity=".7"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${closed}" fill="url(#fg)"/>
        <path d="${topPath}" fill="none" stroke="rgba(74,122,245,.4)" stroke-width="1.5"/>
        <path d="${botPath}" fill="none" stroke="rgba(74,122,245,.4)" stroke-width="1.5"/>
        ${labels}
      </svg>
    </div>`;
}

/* ─── EVENTOS TABLE ─── */
function renderEventos(){
  const sessions = {};
  _ev.forEach(e=>{
    if(!sessions[e.s]) sessions[e.s]={sid:e.s,first:e.t,ref:e.ref||'',evs:[]};
    if(e.t<sessions[e.s].first) sessions[e.s].first=e.t;
    sessions[e.s].evs.push(e);
    if(e.ref) sessions[e.s].ref=e.ref;
  });

  const rows = Object.values(sessions).sort((a,b)=>b.first-a.first);
  const total= rows.length;
  const pages= Math.ceil(total/_evPP)||1;
  const page = Math.min(_evPage,pages);
  const slice= rows.slice((page-1)*_evPP, page*_evPP);
  const avs  = ['😎','🧑','👩','🙂','😄','🧔','👱','🙍','😊','🤓'];
  const fDate= t=>new Date(t).toLocaleDateString('pt-BR');

  const trows = slice.map(s=>{
    const av  = avs[s.sid.charCodeAt(0)%avs.length];
    const src = s.ref||'Direct';
    // build one cell per view/answer/checkout event, all steps
    const evsSorted = s.evs.slice().sort((a,b)=>a.t-b.t);
    const cols = evsSorted.map(e=>{
      if(e.ev==='view')           return `<td><span class="bev view">👁 Etapa ${e.step!==undefined?+e.step+1:''}</span></td>`;
      if(e.ev==='answer')         return `<td><span class="bev ans">✓ ${String(e.ans||'').slice(0,16)}</span></td>`;
      if(e.ev==='checkout_click') return `<td><span class="bev chk">🛒 Checkout</span></td>`;
      return '';
    }).filter(Boolean);
    const maxCols = Math.max(...slice.map(s=>s.evs.length), 4);
    while(cols.length < 4) cols.push('<td style="color:#ddd">—</td>');
    return `<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1"><div class="td-lead"><div class="avatar">${av}</div><span>${fDate(s.first)}</span></div></td>
      <td style="position:sticky;left:120px;background:#fff;z-index:1"><div class="src"><span class="src-dot"></span>${src}</div></td>
      ${cols.join('')}
    </tr>`;
  }).join('');

  // dynamic header — find max events across visible sessions
  const maxEvs = Math.max(...slice.map(s=>s.evs.length), 4);
  const thCols = Array.from({length:maxEvs},(_,i)=>`<th>Passo ${i+1}</th>`).join('');

  const pgNums = Array.from({length:Math.min(pages,7)},(_,i)=>`<button class="pb${i+1===page?' on':''}" onclick="_evPage=${i+1};renderEventos()">${i+1}</button>`).join('');

  document.getElementById('tab-eventos').innerHTML=`
    <div class="tbl-bar">
      <button class="tbtn" onclick="">⚙ Filtros Avançados</button>
      <button class="tbtn" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="tbtn red" onclick="resetLeads()">🗑 Resetar Leads</button>
      <div class="pg-sel">
        <select onchange="_evPP=+this.value;_evPage=1;renderEventos()">
          <option value="10"${_evPP===10?' selected':''}>10 por página</option>
          <option value="25"${_evPP===25?' selected':''}>25 por página</option>
          <option value="50"${_evPP===50?' selected':''}>50 por página</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap" style="overflow-x:auto">
      <table style="min-width:700px">
        <thead><tr>
          <th style="position:sticky;left:0;background:#fafafa;z-index:2">Leads</th>
          <th style="position:sticky;left:120px;background:#fafafa;z-index:2">Source</th>
          ${thCols}
        </tr></thead>
        <tbody>${trows||`<tr><td colspan="${maxEvs+2}" style="text-align:center;color:#ccc;padding:48px;font-size:14px">Sem sessões registradas ainda</td></tr>`}</tbody>
      </table>
    </div>
    <div class="pag">
      <span>${total} sessão${total!==1?'ões':''} encontrada${total!==1?'s':''}</span>
      <div class="pag-btns">${pgNums}</div>
    </div>`;
}

/* ─── RESUMO ─── */
function renderResumo(sc, views, answers, checkouts, vViews){
  // Gênero — views do step>=2 já têm gender definido (step 1 answer nunca é enviado)
  const gMap={};
  const gSeen=new Set();
  views.filter(e=>+e.step>=2&&e.gender).sort((a,b)=>a.t-b.t).forEach(e=>{
    if(gSeen.has(e.s))return; gSeen.add(e.s);
    const g=e.gender;
    if(!gMap[g])gMap[g]=new Set();
    gMap[g].add(e.s);
  });
  const gTotal=Object.values(gMap).reduce((a,s)=>a+s.size,0)||1;
  const gRows=Object.entries(gMap).sort((a,b)=>b[1].size-a[1].size).map(([g,s])=>`
    <div class="bar-row">
      <span class="bar-lbl">${g}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(s.size/gTotal*100).toFixed(0)}%"></div></div>
      <span class="bar-n">${s.size}</span>
    </div>`).join('');

  // Top Respostas
  const aCounts={};
  answers.forEach(e=>{ const k=String(e.ans||'').slice(0,24); aCounts[k]=(aCounts[k]||0)+1; });
  const topA=Object.entries(aCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxA=topA[0]?.[1]||1;
  const aRows=topA.map(([k,v])=>`
    <div class="bar-row">
      <span class="bar-lbl" title="${k}">${k.slice(0,16)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/maxA*100).toFixed(0)}%;background:#10b981"></div></div>
      <span class="bar-n">${v}</span>
    </div>`).join('');

  // Checkout stats
  const chkN  = new Set(checkouts.map(e=>e.s)).size;
  const vN    = new Set(vViews.map(e=>e.s)).size;
  const lds   = sc['1']||0;
  const cvRate= lds>0?((chkN/lds)*100).toFixed(1)+'%':'0%';

  // Funil progress
  const base=sc['0']||1;
  const fSteps=[{l:'Landing',s:0},{l:'Gênero',s:1},{l:'50% do funil',s:21},{l:'Completou',s:40}];
  const fRows=fSteps.map(({l,s})=>{
    const v=sc[String(s)]||0;
    return `<div class="bar-row">
      <span class="bar-lbl">${l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min((v/base*100),100).toFixed(0)}%;background:#8b5cf6"></div></div>
      <span class="bar-n">${v}</span>
    </div>`;
  }).join('');

  document.getElementById('tab-resumo').innerHTML=`
    <div class="res-grid">
      <div class="mc"><h3>Por Gênero</h3>${gRows||'<p style="color:#ccc;font-size:13px">Sem dados</p>'}</div>
      <div class="mc"><h3>Top Respostas</h3>${aRows||'<p style="color:#ccc;font-size:13px">Sem dados</p>'}</div>
      <div class="mc">
        <h3>Checkout</h3>
        <div class="stat-row">
          ${[{v:vN,l:'Visitas vendas'},{v:chkN,l:'Cliques checkout'},{v:cvRate,l:'Taxa conversão'}].map(i=>`<div class="stat"><div class="stat-v">${i.v}</div><div class="stat-l">${i.l}</div></div>`).join('')}
        </div>
      </div>
      <div class="mc"><h3>Progresso no Funil</h3>${fRows}</div>
    </div>`;
}

/* ─── TAB SWITCH ─── */
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['funil','eventos','resumo'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
}

/* ─── EXPORT CSV ─── */
function exportCSV(){
  const sess={};
  _ev.forEach(e=>{
    if(!sess[e.s]) sess[e.s]={sid:e.s,first:e.t,ref:e.ref||'',evs:[]};
    sess[e.s].evs.push(e);
  });
  let csv='Sessão,Data,Source,Eventos\n';
  Object.values(sess).sort((a,b)=>b.first-a.first).forEach(s=>{
    const d=new Date(s.first).toLocaleDateString('pt-BR');
    const evStr=s.evs.map(e=>e.ev+(e.ans?':'+e.ans:'')).join(' | ');
    csv+=`"${s.sid}","${d}","${s.ref||'Direct'}","${evStr}"\n`;
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='mounjaro-leads.csv'; a.click();
}

/* ─── RESET ─── */
function resetLeads(){
  if(!confirm('⚠️ Isso vai apagar TODOS os dados do Google Sheets e do cache local. Essa ação não pode ser desfeita. Continuar?')) return;
  toast('Apagando dados remotos…');
  fetch(GAS+'?action=reset', {method:'POST', body:JSON.stringify({action:'reset'}), mode:'no-cors'})
    .catch(()=>{});
  // aguarda 1s e limpa local também
  setTimeout(()=>{
    localStorage.removeItem(KEY);
    localStorage.removeItem(CKEY);
    // limpa flags de "já visto" para este dispositivo
    Object.keys(localStorage).filter(k=>k.startsWith('mdjp_seen_')).forEach(k=>localStorage.removeItem(k));
    _ev=[];
    render();
    toast('Dados apagados com sucesso ✓');
  }, 1000);
}

/* ─── VENDAS PAYT ─── */
let _vendas = [];

async function fetchVendas(){
  try{
    const r = await fetch(GAS+'?sheet=vendas');
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  }catch(e){ return []; }
}

function renderVendas(){
  const v = _vendas;
  if(!v.length){
    document.getElementById('vendasBody').innerHTML='<p style="color:#bbb;font-size:13px">Nenhuma venda registrada ainda.</p>';
    return;
  }

  const aprovadas  = v.filter(e=>(e.status||'').toLowerCase().includes('finaliz')||( e.status||'').toLowerCase().includes('aprovad'));
  const aguardando = v.filter(e=>(e.status||'').toLowerCase().includes('aguardando'));
  const canceladas = v.filter(e=>(e.status||'').toLowerCase().includes('cancelad'));
  const expiradas  = v.filter(e=>(e.status||'').toLowerCase().includes('expir'));
  const abandono   = v.filter(e=>(e.status||'').toLowerCase().includes('abandon'));

  function metodoCount(list, term){ return list.filter(e=>(e.metodo||'').toLowerCase().includes(term)).length; }
  const pix    = metodoCount(aprovadas,'pix');
  const boleto = metodoCount(aprovadas,'boleto');
  const cartao = metodoCount(aprovadas,'credit')||metodoCount(aprovadas,'card')||metodoCount(aprovadas,'cartao');

  const receita = aprovadas.reduce((s,e)=>s+(parseFloat(e.valor)||0),0);

  const kpis = [
    {ico:'💰',lbl:'Receita Total',v:'R$ '+receita.toFixed(2).replace('.',',')},
    {ico:'✅',lbl:'Vendas Aprovadas',v:aprovadas.length},
    {ico:'⏳',lbl:'Aguardando Pagamento',v:aguardando.length},
    {ico:'❌',lbl:'Canceladas',v:canceladas.length},
    {ico:'⌛',lbl:'Pagamento Expirado',v:expiradas.length},
    {ico:'🚪',lbl:'Abandono de Checkout',v:abandono.length},
  ];

  const metodos = `
    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:20px">
      <div class="stat"><div class="stat-v">${pix}</div><div class="stat-l">Pix aprovados</div></div>
      <div class="stat"><div class="stat-v">${boleto}</div><div class="stat-l">Boletos aprovados</div></div>
      <div class="stat"><div class="stat-v">${cartao}</div><div class="stat-l">Cartão aprovados</div></div>
    </div>`;

  const rows = [...v].reverse().slice(0,20).map(e=>{
    const status = e.status||'';
    const cor = status.toLowerCase().includes('finaliz')||status.toLowerCase().includes('aprovad') ? '#16a34a'
              : status.toLowerCase().includes('aguard') ? '#d97706'
              : '#ef4444';
    const dt = e.data ? new Date(e.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    return `<tr>
      <td>${dt}</td>
      <td><span style="color:${cor};font-weight:700;font-size:12px">${status}</span></td>
      <td>${e.metodo||'—'}</td>
      <td>R$ ${parseFloat(e.valor||0).toFixed(2).replace('.',',')}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nome||'—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('vendasBody').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:8px">
      ${kpis.map(k=>`<div class="kpi-card"><div class="kpi-ico">${k.ico}</div><div class="kpi-val">${k.v}</div><div class="kpi-lbl">${k.lbl}</div></div>`).join('')}
    </div>
    ${metodos}
    <div style="margin-top:20px;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="border-bottom:2px solid #f0f2f5;color:#aaa;font-size:11px;text-transform:uppercase">
          <th style="padding:8px 6px;text-align:left">Data</th>
          <th style="padding:8px 6px;text-align:left">Status</th>
          <th style="padding:8px 6px;text-align:left">Método</th>
          <th style="padding:8px 6px;text-align:left">Valor</th>
          <th style="padding:8px 6px;text-align:left">Nome</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function initVendas(){
  document.getElementById('vendasSync').textContent='Sincronizando…';
  _vendas = await fetchVendas();
  document.getElementById('vendasSync').textContent='';
  renderVendas();
}

/* ─── RESIZE ─── */
window.addEventListener('resize',()=>{
  if(_ev.length) renderArea(_ev.filter(e=>e.ev==='view'&&e.step!=='vendas'));
});
</script>
