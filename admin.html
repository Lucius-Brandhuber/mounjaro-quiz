<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Mounjaro de Pobre</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;color:#1a1a2e;min-height:100vh}

/* ── LOGIN ── */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#3db8ac 0%,#2563eb 100%)}
.lcard{background:#fff;border-radius:20px;padding:48px 40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.lcard .logo{font-size:40px;margin-bottom:8px}
.lcard h1{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.lcard p{color:#aaa;font-size:13px;margin-bottom:28px}
.lcard input{width:100%;padding:13px 16px;border:2px solid #e8ecf0;border-radius:12px;font-size:15px;outline:none;transition:.2s;margin-bottom:12px}
.lcard input:focus{border-color:#3db8ac}
.lcard button{width:100%;padding:14px;background:linear-gradient(90deg,#3db8ac,#2fa898);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
.lcard button:hover{opacity:.9}
.lerr{color:#ef4444;font-size:13px;margin-top:8px;display:none}

/* ── DASH ── */
#dash{display:none}

/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:1px solid #eee;padding:0 28px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tb-logo{font-size:15px;font-weight:800;color:#1a1a2e}
.tb-logo span{color:#3db8ac}
.tb-spacer{flex:1}
.tb-sync{font-size:12px;color:#aaa}
.tb-date{font-size:12px;color:#666;background:#f5f7fa;padding:6px 12px;border-radius:20px}
.tb-btn{padding:8px 14px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:#333;font-weight:500;transition:.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tb-btn:hover{background:#f5f7fa}

/* ── CONTENT ── */
.content{max-width:1400px;margin:0 auto;padding:22px 28px}

/* ── CARDS ── */
.card{background:#fff;border-radius:16px;border:1px solid #e8ecf0;margin-bottom:18px;overflow:hidden}
.card-hdr{padding:18px 22px 0;display:flex;align-items:center;gap:10px}
.card-title{font-size:14px;font-weight:700;color:#1a1a2e}
.card-sub{font-size:12px;color:#bbb;margin-left:auto}
.card-body{padding:14px 22px 22px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:18px}
.kpi{background:#fff;border-radius:14px;border:1px solid #e8ecf0;padding:18px 16px}
.kpi-ico{font-size:20px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;color:#1a1a2e;line-height:1}
.kpi-lbl{font-size:11px;color:#aaa;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-sub{font-size:11px;color:#ccc;margin-top:2px}

/* ── FUNNEL MINI ── */
.funnel-mini{display:flex;align-items:flex-start;gap:0}
.fm-step{flex:1;padding-right:8px}
.fm-bar-wrap{height:5px;background:#f0f2f7;border-radius:3px;overflow:hidden;margin-bottom:8px}
.fm-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#3db8ac,#4A7AF5);transition:width .5s}
.fm-lbl{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fm-val{font-size:18px;font-weight:900;color:#1a1a2e;margin-top:2px}
.fm-pct{font-size:11px;color:#3db8ac;font-weight:600}
.fm-arrow{color:#ddd;font-size:20px;padding:0 2px;margin-top:16px;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:#f5f7fa;border-radius:10px;padding:3px;margin-bottom:18px;width:fit-content;flex-wrap:wrap}
.tab{padding:8px 16px;border:none;border-radius:8px;background:none;font-size:13px;font-weight:500;color:#888;cursor:pointer;transition:.15s;white-space:nowrap}
.tab.active{background:#fff;color:#1a1a2e;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ── TABLE ── */
.tbl-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;background:#fff;cursor:pointer;color:#555;font-weight:500;transition:.15s}
.tbtn:hover{background:#f5f7fa}
.tbtn.danger{color:#dc2626;border-color:#fca5a5}
.tbtn.danger:hover{background:#fff5f5}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #f0f2f7;white-space:nowrap;background:#fff}
td{padding:9px 12px;border-bottom:1px solid #f5f7fa;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.bev{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bev.view{background:#eef2ff;color:#4A7AF5}
.bev.ans{background:#f0fdf4;color:#16a34a}
.bev.chk{background:#fff7ed;color:#ea580c}
.avatar{width:28px;height:28px;border-radius:50%;background:#eef2ff;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.src-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555}
.src-dot{width:6px;height:6px;border-radius:50%;background:#3db8ac;display:inline-block;flex-shrink:0}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12px;color:#aaa}
.pag-btns{display:flex;gap:4px}
.pb{padding:5px 10px;border:1px solid #e5e7eb;border-radius:7px;background:#fff;font-size:12px;cursor:pointer;transition:.1s}
.pb.on{background:#3db8ac;color:#fff;border-color:#3db8ac}

/* ── BAR CHARTS ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-lbl{width:100px;font-size:12px;color:#666;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:8px;background:#f0f2f7;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3db8ac,#4A7AF5);transition:width .4s}
.bar-n{width:32px;text-align:right;font-size:12px;font-weight:700;color:#1a1a2e}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.stat-card{background:#f8f9ff;border-radius:12px;padding:16px}
.stat-val{font-size:22px;font-weight:900;color:#1a1a2e}
.stat-lbl{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* ── BADGE ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.ok{background:#dcfce7;color:#15803d}
.badge.warn{background:#fef9c3;color:#854d0e}
.badge.err{background:#fee2e2;color:#991b1b}

/* ── CAPI DOT ── */
.capi-dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── GRID ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.mc{background:#f8f9ff;border-radius:12px;padding:18px}
.mc h3{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f5f7fa}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .two-col,.three-col{grid-template-columns:1fr}
  .content{padding:14px 16px}
  .topbar{padding:0 16px;gap:8px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="gate">
  <div class="lcard">
    <div class="logo">🔥</div>
    <h1>Mounjaro de Pobre</h1>
    <p>Painel administrativo — acesso restrito</p>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')auth()">
    <button onclick="auth()">Entrar</button>
    <div class="lerr" id="lerr">Senha incorreta</div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dash">

  <div class="topbar">
    <div class="tb-logo">🔥 <span>Mounjaro</span> Admin</div>
    <div class="tb-spacer"></div>
    <span class="tb-sync" id="syncTxt"></span>
    <div class="tb-date">📅 <span id="dateRange">—</span></div>
    <button class="tb-btn" onclick="doRefresh()">↻ Atualizar</button>
  </div>

  <div class="content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiRow"></div>

    <!-- Funil mini + área -->
    <div class="card">
      <div class="card-hdr">
        <span class="card-title">Funil de Conversão</span>
        <span class="card-sub" id="dateRange2"></span>
      </div>
      <div class="card-body">
        <div id="funnelMini" style="margin-bottom:16px"></div>
        <svg id="areaChart" height="150" style="display:block;width:100%"></svg>
      </div>
    </div>

    <!-- Tabs -->
    <div class="card">
      <div class="card-body" style="padding-top:20px">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('funil',this)">📊 Funil</button>
          <button class="tab" onclick="switchTab('eventos',this)">📋 Eventos</button>
          <button class="tab" onclick="switchTab('resumo',this)">📈 Resumo</button>
          <button class="tab" onclick="switchTab('vendas',this)">💰 Vendas</button>
          <button class="tab" onclick="switchTab('capi',this)">⚡ Meta CAPI</button>
        </div>
        <div id="tab-funil"></div>
        <div id="tab-eventos" style="display:none"></div>
        <div id="tab-resumo" style="display:none"></div>
        <div id="tab-vendas" style="display:none"></div>
        <div id="tab-capi" style="display:none"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PWD  = 'L3c1U64&5';
const KEY  = 'mdjp_ev';
const CKEY = 'mdjp_admin_cache';
const GAS  = 'https://script.google.com/macros/s/AKfycby-7fqfYdyX3_ox1ooSlplYeo-UfHzzXh37g7PJNW0AlrxRjJ3eid5HBxr9i25LeBX8/exec';

let _ev=[], _vendas=[], _capiLog=[], _evPage=1, _evPP=10;

/* ── AUTH ── */
function auth(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('gate').style.display='none';
    document.getElementById('dash').style.display='block';
    init();
  } else {
    document.getElementById('lerr').style.display='block';
  }
}

/* ── TOAST ── */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

/* ── NORMALIZE ── */
function norm(e){
  const t=e.t||(e.data?new Date(e.data).getTime():0)||0;
  return {
    ev:    e.ev    ||e.evento   ||'',
    s:     e.s     ||e.session  ||'',
    step:  e.step!=null?e.step:'',
    t,
    name:  e.name  ||e.nome     ||'',
    gender:e.gender||e.genero   ||'',
    ans:   e.ans   ||e.resposta ||'',
    ms:    +e.ms||0,
    ref:   e.ref   ||e.referrer ||'',
    ua:    e.ua    ||'',
    event_id:e.event_id||'',
    fbp:   e.fbp   ||'',
    fbc:   e.fbc   ||'',
    url:   e.url   ||''
  };
}

/* ── LOCAL STORAGE ── */
function getLocal(){ try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];} }
function getCache(){ try{return JSON.parse(localStorage.getItem(CKEY)||'[]');}catch(e){return[];} }

function merge(a,b){
  const seen=new Set(a.map(e=>`${e.s}|${e.ev}|${e.step}|${e.t}`));
  b.forEach(e=>{const k=`${e.s}|${e.ev}|${e.step}|${e.t}`;if(!seen.has(k)){seen.add(k);a.push(e);}});
  return a;
}

/* ── FETCH ── */
async function fetchSheet(qs){
  try{
    const r=await fetch(GAS+(qs?'?sheet='+qs:''));
    const d=await r.json();
    return Array.isArray(d)?d:[];
  }catch(e){return[];}
}

/* ── INIT ── */
async function init(){
  const cached=merge(getCache(),getLocal()).map(norm).filter(e=>e.s);
  if(cached.length){_ev=cached;render();}
  sync();
}

async function sync(){
  document.getElementById('syncTxt').textContent='Sincronizando…';
  const [remote,vendas,capiLog]=await Promise.all([
    fetchSheet(''),
    fetchSheet('vendas'),
    fetchSheet('capi_log')
  ]);
  const remNorm=remote.map(norm).filter(e=>e.s);
  const local=getLocal().map(norm).filter(e=>e.s);
  const base=remNorm.length>0?remNorm:(_ev.length>0?_ev:[]);
  const merged=merge(base.slice(),local);
  if(merged.length>0){
    localStorage.setItem(CKEY,JSON.stringify(merged));
    _ev=merged;
  }
  _vendas=vendas;
  _capiLog=capiLog;
  document.getElementById('syncTxt').textContent='';
  render();
  toast(`✓ ${_ev.length} eventos · ${_vendas.length} vendas · ${_capiLog.length} CAPI`);
}

async function doRefresh(){await sync();}

/* ── UNIQUE PER STEP ── */
function uPerStep(views){
  const m={};
  views.forEach(e=>{
    const k=String(e.step);
    if(!m[k])m[k]=new Set();
    m[k].add(e.s);
  });
  const c={};Object.keys(m).forEach(k=>{c[k]=m[k].size;});
  return c;
}

/* ── MAIN RENDER ── */
function render(){
  const views    =_ev.filter(e=>e.ev==='view'&&e.step!=='vendas');
  const answers  =_ev.filter(e=>e.ev==='answer');
  const checkouts=_ev.filter(e=>e.ev==='checkout_click');
  const vViews   =_ev.filter(e=>e.ev==='view'&&e.step==='vendas');
  const sc=uPerStep(views);
  try{renderKPIs(sc,checkouts);}catch(e){console.error(e);}
  try{renderFunnelMini(sc);}catch(e){console.error(e);}
  try{renderArea(views);}catch(e){console.error(e);}
  try{renderFunil(sc);}catch(e){console.error(e);}
  try{renderEventos();}catch(e){console.error('ev',e);document.getElementById('tab-eventos').innerHTML=`<p style="color:red;padding:16px">Erro: ${e.message}</p>`;}
  try{renderResumo(sc,views,answers,checkouts,vViews);}catch(e){console.error('res',e);}
  try{renderVendas();}catch(e){console.error(e);}
  try{renderCapi();}catch(e){console.error(e);}
  updateDate();
}

/* ── KPIs ── */
function renderKPIs(sc,checkouts){
  const allV=_ev.filter(e=>e.ev==='view'&&e.step!=='vendas');
  const uniq=new Set(allV.map(e=>e.s)).size||1;
  const pv  =sc['0']||uniq;
  const lds =sc['1']||0;
  const qual=sc['21']||0;
  const done=sc['40']||0;
  const chkN=new Set(checkouts.map(e=>e.s)).size;
  const inter=pv>0?Math.min((lds/pv)*100,100).toFixed(1)+'%':'0%';
  const receita=_vendas.filter(v=>isApproved(v.status||'')).reduce((s,v)=>s+(parseFloat(v.valor)||0),0);
  document.getElementById('kpiRow').innerHTML=[
    {ico:'👁',v:pv,   l:'Visitantes', sub:'Landing page'},
    {ico:'🙋',v:lds,  l:'Leads',      sub:'Iniciaram quiz'},
    {ico:'⚡',v:inter,l:'% Interação',sub:'Leads / Visitantes'},
    {ico:'✅',v:qual, l:'Qualificados',sub:'50% do funil'},
    {ico:'🛒',v:chkN, l:'Checkout',   sub:'Cliques únicos'},
    {ico:'💰',v:'R$ '+receita.toFixed(2).replace('.',','),l:'Receita',sub:'Vendas aprovadas'},
  ].map(k=>`<div class="kpi"><div class="kpi-ico">${k.ico}</div><div class="kpi-val">${k.v}</div><div class="kpi-lbl">${k.l}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}

/* ── FUNNEL MINI ── */
function renderFunnelMini(sc){
  const fsteps=[{l:'Landing',s:0},{l:'Quiz',s:2},{l:'50% Funil',s:21},{l:'Resultado',s:40}];
  const base=sc['0']||1;
  const html=fsteps.map((st,i)=>{
    const v=sc[String(st.s)]||0;
    const pct=Math.min((v/base)*100,100).toFixed(0);
    const prev=i>0?sc[String(fsteps[i-1].s)]||1:null;
    const step=prev!=null?(v/Math.max(prev,1)*100).toFixed(0)+'%':'100%';
    return `${i>0?'<div class="fm-arrow">›</div>':''}
    <div class="fm-step">
      <div class="fm-bar-wrap"><div class="fm-bar" style="width:${pct}%"></div></div>
      <div class="fm-lbl">${st.l}</div>
      <div class="fm-val">${v}</div>
      <div class="fm-pct">${step}</div>
    </div>`;
  }).join('');
  document.getElementById('funnelMini').innerHTML=`<div class="funnel-mini">${html}</div>`;
}

/* ── AREA CHART ── */
function renderArea(views){
  const svg=document.getElementById('areaChart');
  const W=svg.parentElement.offsetWidth||900,H=150;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width',W);
  const landing=views.filter(e=>+e.step===0);
  const DAYS=14,now=Date.now(),ms=864e5;
  const bkts=Array.from({length:DAYS},(_,i)=>{
    const s=now-(DAYS-1-i)*ms,en=s+ms;
    return{n:landing.filter(x=>x.t>=s&&x.t<en).length,d:new Date(s)};
  });
  const maxN=Math.max(...bkts.map(b=>b.n),1);
  const pL=36,pR=12,pT=14,pB=34;
  const W2=W-pL-pR,H2=H-pT-pB;
  const x=i=>pL+i*(W2/(DAYS-1));
  const y=n=>pT+H2-(n/maxN)*H2;
  const pts=bkts.map((b,i)=>({x:x(i),y:y(b.n),n:b.n,d:b.d}));
  let path=`M${pts[0].x} ${pts[0].y}`;
  for(let i=1;i<pts.length;i++){const cx=(pts[i-1].x+pts[i].x)/2;path+=` C${cx} ${pts[i-1].y} ${cx} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;}
  const area=path+` L${pts[pts.length-1].x} ${H-pB} L${pts[0].x} ${H-pB} Z`;
  const lbls=pts.filter((_,i)=>i===0||i%3===0||i===DAYS-1).map(p=>`<text x="${p.x}" y="${H-6}" text-anchor="middle" font-size="9" fill="#bbb">${p.d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</text>`).join('');
  const ymax=`<text x="${pL-4}" y="${pT+4}" text-anchor="end" font-size="9" fill="#ccc">${maxN}</text>`;
  const dots=pts.map(p=>p.n>0?`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#3db8ac"/><text x="${p.x}" y="${p.y-6}" text-anchor="middle" font-size="9" fill="#3db8ac" font-weight="700">${p.n}</text>`:'').join('');
  svg.innerHTML=`<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3db8ac" stop-opacity=".2"/><stop offset="100%" stop-color="#3db8ac" stop-opacity=".01"/></linearGradient></defs>
    <line x1="${pL}" y1="${pT}" x2="${W-pR}" y2="${pT}" stroke="#f0f2f7"/>
    <line x1="${pL}" y1="${H-pB}" x2="${W-pR}" y2="${H-pB}" stroke="#f0f2f7"/>
    ${ymax}<path d="${area}" fill="url(#ag)"/><path d="${path}" fill="none" stroke="#3db8ac" stroke-width="2"/>${dots}${lbls}`;
}

/* ── FUNIL DETALHADO ── */
function renderFunil(sc){
  const steps=Array.from({length:41},(_,i)=>i);
  const counts=steps.map(i=>sc[String(i)]||0);
  const maxC=Math.max(...counts,1);
  const SW=100,H=240,CY=H/2+8,maxH=170,botPad=56;
  const W=steps.length*SW;
  const pts=steps.map((_,i)=>({x:i*SW+SW/2,h:Math.max((counts[i]/maxC)*maxH,2)}));
  function curve(arr,fn){
    let d=`M${arr[0].x} ${fn(arr[0])}`;
    for(let i=1;i<arr.length;i++){const cx=(arr[i-1].x+arr[i].x)/2;d+=` C${cx} ${fn(arr[i-1])} ${cx} ${fn(arr[i])} ${arr[i].x} ${fn(arr[i])}`;}
    return d;
  }
  const topP=curve(pts,p=>CY-p.h/2);
  const botP=curve(pts,p=>CY+p.h/2);
  const rev=[...pts].reverse();
  let closed=topP;
  rev.forEach((p,i)=>{
    if(i===0){closed+=` L${p.x} ${CY+p.h/2}`;return;}
    const px=rev[i-1];const cx=(px.x+p.x)/2;
    closed+=` C${cx} ${CY+px.h/2} ${cx} ${CY+p.h/2} ${p.x} ${CY+p.h/2}`;
  });
  closed+=' Z';
  const labels=steps.map((s,i)=>{
    const x=i*SW+SW/2,yB=H+4;
    const drop=i>0&&counts[0]>0?((counts[i]/counts[0])*100).toFixed(0)+'%':'—';
    return `<text x="${x}" y="${yB+11}" text-anchor="middle" font-size="8.5" fill="#bbb" font-weight="700">P${i+1}</text>
      <text x="${x}" y="${yB+24}" text-anchor="middle" font-size="12" font-weight="800" fill="#1a1a2e">${counts[i]}</text>
      <text x="${x}" y="${yB+36}" text-anchor="middle" font-size="9" fill="#3db8ac">${drop}</text>`;
  }).join('');
  document.getElementById('tab-funil').innerHTML=`
    <div style="overflow-x:auto;padding-bottom:4px">
      <svg width="${W}" height="${H+botPad}">
        <defs><linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3db8ac" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#4A7AF5" stop-opacity=".8"/>
        </linearGradient></defs>
        <path d="${closed}" fill="url(#fg)"/>
        <path d="${topP}" fill="none" stroke="rgba(61,184,172,.25)" stroke-width="1.5"/>
        <path d="${botP}" fill="none" stroke="rgba(61,184,172,.25)" stroke-width="1.5"/>
        ${labels}
      </svg>
    </div>`;
}

/* ── EVENTOS ── */
function renderEventos(){
  const sessions={};
  _ev.filter(e=>e.s).forEach(e=>{
    if(!sessions[e.s])sessions[e.s]={sid:e.s,first:e.t||0,ref:e.ref||'',evs:[]};
    if((e.t||0)<sessions[e.s].first)sessions[e.s].first=e.t||0;
    sessions[e.s].evs.push(e);
    if(e.ref)sessions[e.s].ref=e.ref;
  });
  const rows=Object.values(sessions).sort((a,b)=>b.first-a.first);
  const total=rows.length,pages=Math.ceil(total/_evPP)||1;
  const page=Math.min(_evPage,pages);
  const slice=rows.slice((page-1)*_evPP,page*_evPP);
  const avs=['😎','🧑','👩','🙂','😄','🧔','👱','🙍','😊','🤓'];
  const fDate=t=>new Date(t).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  const maxEvs=Math.max(...(slice.length?slice.map(s=>s.evs.length):[4]),4);
  const thCols=Array.from({length:maxEvs},(_,i)=>`<th>Passo ${i+1}</th>`).join('');
  const trows=slice.map(s=>{
    const av=avs[((s.sid||'a').charCodeAt(0))%avs.length];
    const cols=s.evs.slice().sort((a,b)=>a.t-b.t).map(e=>{
      if(e.ev==='view')return`<td><span class="bev view">👁 ${e.step!==''?'Etapa '+(+e.step+1):e.name||''}</span></td>`;
      if(e.ev==='answer')return`<td><span class="bev ans">✓ ${String(e.ans||'').slice(0,14)}</span></td>`;
      if(e.ev==='checkout_click')return`<td><span class="bev chk">🛒 Checkout</span></td>`;
      return'';
    }).filter(Boolean);
    while(cols.length<4)cols.push('<td style="color:#e5e7eb">—</td>');
    return`<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1;min-width:140px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="avatar">${av}</div>
          <span style="font-size:12px;color:#666">${fDate(s.first)}</span>
        </div>
      </td>
      <td style="position:sticky;left:140px;background:#fff;z-index:1;min-width:90px">
        <div class="src-badge"><span class="src-dot"></span>${s.ref||'Direct'}</div>
      </td>
      ${cols.join('')}
    </tr>`;
  }).join('');
  const pgNums=Array.from({length:Math.min(pages,7)},(_,i)=>`<button class="pb${i+1===page?' on':''}" onclick="_evPage=${i+1};renderEventos()">${i+1}</button>`).join('');
  document.getElementById('tab-eventos').innerHTML=`
    <div class="tbl-bar">
      <button class="tbtn" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="tbtn danger" onclick="resetLeads()">🗑 Resetar Dados</button>
      <div style="margin-left:auto">
        <select onchange="_evPP=+this.value;_evPage=1;renderEventos()" style="border:1px solid #e5e7eb;border-radius:7px;padding:6px 10px;font-size:12px;background:#fff;cursor:pointer">
          <option value="10"${_evPP===10?' selected':''}>10 / página</option>
          <option value="25"${_evPP===25?' selected':''}>25 / página</option>
          <option value="50"${_evPP===50?' selected':''}>50 / página</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table style="min-width:700px">
        <thead><tr>
          <th style="position:sticky;left:0;background:#fafbff;z-index:2;min-width:140px">Sessão</th>
          <th style="position:sticky;left:140px;background:#fafbff;z-index:2;min-width:90px">Origem</th>
          ${thCols}
        </tr></thead>
        <tbody>${trows||`<tr><td colspan="${maxEvs+2}" style="text-align:center;color:#ccc;padding:48px 0;font-size:14px">Nenhuma sessão registrada</td></tr>`}</tbody>
      </table>
    </div>
    <div class="pag">
      <span>${total} sessão${total!==1?'ões':''}</span>
      <div class="pag-btns">${pgNums}</div>
    </div>`;
}

/* ── RESUMO ── */
function renderResumo(sc,views,answers,checkouts,vViews){
  // Gênero
  const gMap={},gSeen=new Set();
  views.filter(e=>+e.step>=2&&e.gender).sort((a,b)=>a.t-b.t).forEach(e=>{
    if(gSeen.has(e.s))return;gSeen.add(e.s);
    if(!gMap[e.gender])gMap[e.gender]=new Set();
    gMap[e.gender].add(e.s);
  });
  const gTotal=Object.values(gMap).reduce((a,s)=>a+s.size,0)||1;
  const gRows=Object.entries(gMap).sort((a,b)=>b[1].size-a[1].size).map(([g,s])=>`
    <div class="bar-row"><span class="bar-lbl">${g}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${(s.size/gTotal*100).toFixed(0)}%"></div></div>
    <span class="bar-n">${s.size}</span></div>`).join('');

  // Origens
  const rMap={},rSeen=new Set();
  views.filter(e=>+e.step===0).forEach(e=>{
    if(rSeen.has(e.s))return;rSeen.add(e.s);
    const src=e.ref||'Direct';rMap[src]=(rMap[src]||0)+1;
  });
  const topR=Object.entries(rMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxR=topR[0]?.[1]||1;
  const rRows=topR.map(([r,n])=>`
    <div class="bar-row"><span class="bar-lbl">${r}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${(n/maxR*100).toFixed(0)}%;background:linear-gradient(90deg,#f59e0b,#fbbf24)"></div></div>
    <span class="bar-n">${n}</span></div>`).join('');

  // Top respostas
  const aC={};
  answers.forEach(e=>{const k=String(e.ans||'').slice(0,24);if(k)aC[k]=(aC[k]||0)+1;});
  const topA=Object.entries(aC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxA=topA[0]?.[1]||1;
  const aRows=topA.map(([k,v])=>`
    <div class="bar-row"><span class="bar-lbl" title="${k}">${k.slice(0,18)}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${(v/maxA*100).toFixed(0)}%;background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div>
    <span class="bar-n">${v}</span></div>`).join('');

  // Checkout
  const chkN=new Set(checkouts.map(e=>e.s)).size;
  const vN=new Set(vViews.map(e=>e.s)).size;
  const lds=sc['1']||0;
  const cvRate=lds>0?((chkN/lds)*100).toFixed(1)+'%':'0%';

  // Progresso
  const base=sc['0']||1;
  const fSteps=[{l:'Landing',s:0},{l:'Gênero',s:1},{l:'50% Funil',s:21},{l:'Completou',s:40}];
  const fRows=fSteps.map(({l,s})=>{
    const v=sc[String(s)]||0;
    return`<div class="bar-row"><span class="bar-lbl">${l}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.min((v/base)*100,100).toFixed(0)}%;background:linear-gradient(90deg,#ec4899,#f43f5e)"></div></div>
    <span class="bar-n">${v}</span></div>`;
  }).join('');

  document.getElementById('tab-resumo').innerHTML=`
    <div class="two-col" style="margin-bottom:14px">
      <div class="mc"><h3>Por Gênero</h3>${gRows||'<p style="color:#ccc;font-size:13px">Sem dados</p>'}</div>
      <div class="mc"><h3>Por Origem</h3>${rRows||'<p style="color:#ccc;font-size:13px">Sem dados</p>'}</div>
    </div>
    <div class="two-col">
      <div class="mc"><h3>Top Respostas</h3>${aRows||'<p style="color:#ccc;font-size:13px">Sem dados</p>'}</div>
      <div>
        <div class="mc" style="margin-bottom:14px">
          <h3>Checkout</h3>
          <div style="display:flex;gap:20px;margin-top:4px">
            <div><div style="font-size:22px;font-weight:900;color:#1a1a2e">${vN}</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;font-weight:600">Visitas Vendas</div></div>
            <div><div style="font-size:22px;font-weight:900;color:#1a1a2e">${chkN}</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;font-weight:600">Cliques Checkout</div></div>
            <div><div style="font-size:22px;font-weight:900;color:#3db8ac">${cvRate}</div><div style="font-size:10px;color:#aaa;text-transform:uppercase;font-weight:600">Taxa Conv.</div></div>
          </div>
        </div>
        <div class="mc"><h3>Progresso no Funil</h3>${fRows}</div>
      </div>
    </div>`;
}

/* ── VENDAS ── */
function isApproved(s){
  const l=(s||'').toLowerCase();
  return l.includes('finaliz')||l.includes('aprovad')||l.includes('paid')||l.includes('confirmed');
}
function renderVendas(){
  if(!_vendas.length){
    document.getElementById('tab-vendas').innerHTML=`
      <div style="text-align:center;padding:48px 0;color:#bbb">
        <div style="font-size:40px;margin-bottom:12px">📦</div>
        <p style="font-size:14px;font-weight:600;color:#888">Nenhuma venda registrada ainda</p>
        <p style="font-size:12px;margin-top:6px">Configure o postback do Payt para receber dados aqui</p>
      </div>`;
    return;
  }
  const apr=_vendas.filter(v=>isApproved(v.status||''));
  const agu=_vendas.filter(v=>(v.status||'').toLowerCase().includes('aguard'));
  const can=_vendas.filter(v=>(v.status||'').toLowerCase().includes('cancelad'));
  const exp=_vendas.filter(v=>(v.status||'').toLowerCase().includes('expir'));
  const abd=_vendas.filter(v=>(v.status||'').toLowerCase().includes('abandon'));
  const rec=apr.reduce((s,v)=>s+(parseFloat(v.valor)||0),0);
  const pix=apr.filter(v=>(v.metodo||'').toLowerCase().includes('pix')).length;
  const bol=apr.filter(v=>(v.metodo||'').toLowerCase().includes('boleto')).length;
  const car=apr.filter(v=>(v.metodo||'').toLowerCase().includes('credit')||(v.metodo||'').toLowerCase().includes('card')).length;
  const rows=[..._vendas].reverse().slice(0,30).map(v=>{
    const s=v.status||'';
    const cls=isApproved(s)?'ok':s.toLowerCase().includes('aguard')?'warn':'err';
    const dt=v.data?new Date(v.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    return`<tr>
      <td>${dt}</td>
      <td><span class="badge ${cls}">${s||'—'}</span></td>
      <td>${v.metodo||'—'}</td>
      <td style="font-weight:700">R$ ${parseFloat(v.valor||0).toFixed(2).replace('.',',')}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.nome||'—'}</td>
      <td style="font-size:11px;color:#aaa">${v.order_id||'—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tab-vendas').innerHTML=`
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-val">R$ ${rec.toFixed(2).replace('.',',')}</div><div class="stat-lbl">Receita</div></div>
      <div class="stat-card"><div class="stat-val">${apr.length}</div><div class="stat-lbl">Aprovadas</div></div>
      <div class="stat-card"><div class="stat-val">${agu.length}</div><div class="stat-lbl">Aguardando</div></div>
      <div class="stat-card"><div class="stat-val">${can.length}</div><div class="stat-lbl">Canceladas</div></div>
      <div class="stat-card"><div class="stat-val">${exp.length}</div><div class="stat-lbl">Expiradas</div></div>
      <div class="stat-card"><div class="stat-val">${abd.length}</div><div class="stat-lbl">Abandono</div></div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div class="stat-card" style="flex:1"><div class="stat-val">${pix}</div><div class="stat-lbl">Pix Aprovado</div></div>
      <div class="stat-card" style="flex:1"><div class="stat-val">${bol}</div><div class="stat-lbl">Boleto Aprovado</div></div>
      <div class="stat-card" style="flex:1"><div class="stat-val">${car}</div><div class="stat-lbl">Cartão Aprovado</div></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Data</th><th>Status</th><th>Método</th><th>Valor</th><th>Nome</th><th>Pedido</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── META CAPI ── */
function renderCapi(){
  const logs=_capiLog.slice(-200).reverse();
  const total=logs.length;
  const ok=logs.filter(l=>+l.status_code===200).length;
  const rate=total>0?((ok/total)*100).toFixed(1)+'%':'—';
  const byEv={};
  logs.forEach(l=>{const ev=l.evento||'?';byEv[ev]=(byEv[ev]||0)+1;});
  const evMax=Math.max(...Object.values(byEv),1);
  const evRows=Object.entries(byEv).sort((a,b)=>b[1]-a[1]).map(([ev,n])=>`
    <div class="bar-row"><span class="bar-lbl">${ev}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${(n/evMax*100).toFixed(0)}%;background:linear-gradient(90deg,#6366f1,#8b5cf6)"></div></div>
    <span class="bar-n">${n}</span></div>`).join('');
  const logRows=logs.slice(0,20).map(l=>{
    const dt=l.data?new Date(l.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    const isOk=+l.status_code===200;
    return`<tr>
      <td>${dt}</td>
      <td style="font-weight:600">${l.evento||'—'}</td>
      <td><span class="badge ${isOk?'ok':'err'}">${l.status_code||'—'}</span></td>
      <td style="font-size:11px;color:#aaa;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.event_id||'—'}</td>
      <td style="font-size:11px;color:#aaa">${(l.s||'').slice(0,10)||'—'}</td>
    </tr>`;
  }).join('');
  const statusOk=total>0&&ok===total;
  document.getElementById('tab-capi').innerHTML=`
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total Enviados</div></div>
      <div class="stat-card"><div class="stat-val">${ok}</div><div class="stat-lbl">Sucesso (200)</div></div>
      <div class="stat-card"><div class="stat-val">${total-ok}</div><div class="stat-lbl">Erros</div></div>
      <div class="stat-card">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <div class="capi-dot" style="background:${statusOk?'#22c55e':total===0?'#f59e0b':'#ef4444'}"></div>
          <span style="font-size:14px;font-weight:700;color:#1a1a2e">${statusOk?'Operacional':total===0?'Aguardando':'Verificar'}</span>
        </div>
        <div class="stat-lbl">Status CAPI</div>
      </div>
      <div class="stat-card"><div class="stat-val">${rate}</div><div class="stat-lbl">Taxa Sucesso</div></div>
    </div>
    <div class="two-col">
      <div class="mc"><h3>Por Evento</h3>${evRows||'<p style="color:#ccc;font-size:13px">Sem logs ainda</p>'}</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Data</th><th>Evento</th><th>Status</th><th>Event ID</th><th>Sessão</th></tr></thead>
          <tbody>${logRows||`<tr><td colspan="5" style="text-align:center;color:#ccc;padding:32px 0">Nenhum log ainda</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
}

/* ── TAB SWITCH ── */
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['funil','eventos','resumo','vendas','capi'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
}

/* ── DATE ── */
function updateDate(){
  const now=new Date(),d14=new Date(now-14*864e5);
  const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const s=f(d14)+' – '+f(now);
  document.getElementById('dateRange').textContent=s;
  const d2=document.getElementById('dateRange2');
  if(d2)d2.textContent=s;
}

/* ── EXPORT CSV ── */
function exportCSV(){
  const sess={};
  _ev.forEach(e=>{
    if(!e.s)return;
    if(!sess[e.s])sess[e.s]={sid:e.s,first:e.t,ref:e.ref||'',evs:[]};
    sess[e.s].evs.push(e);
  });
  let csv='Sessão,Data,Origem,Gênero,Eventos\n';
  Object.values(sess).sort((a,b)=>b.first-a.first).forEach(s=>{
    const d=new Date(s.first).toLocaleDateString('pt-BR');
    const g=s.evs.find(e=>e.gender)?.gender||'';
    const ev=s.evs.map(e=>e.ev+(e.ans?':'+e.ans:'')).join(' | ');
    csv+=`"${s.sid}","${d}","${s.ref||'Direct'}","${g}","${ev}"\n`;
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='mounjaro-leads.csv';a.click();
}

/* ── RESET ── */
function resetLeads(){
  if(!confirm('⚠️ Apagar TODOS os dados do Sheets e cache local?'))return;
  toast('Apagando dados…');
  fetch(GAS,{method:'POST',body:JSON.stringify({action:'reset'}),mode:'no-cors'}).catch(()=>{});
  setTimeout(()=>{
    localStorage.removeItem(KEY);localStorage.removeItem(CKEY);
    Object.keys(localStorage).filter(k=>k.startsWith('mdjp_seen_')).forEach(k=>localStorage.removeItem(k));
    _ev=[];_vendas=[];_capiLog=[];render();
    toast('Dados apagados ✓');
  },1200);
}

/* ── RESIZE ── */
window.addEventListener('resize',()=>{
  if(_ev.length)renderArea(_ev.filter(e=>e.ev==='view'&&e.step!=='vendas'));
});
